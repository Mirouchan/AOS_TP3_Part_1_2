{% extends 'base.html' %}
{% block title %}Livres{% endblock %}

{% block content %}
<h2>📖 Livres</h2>

{% if user.is_authenticated %}
    <p>👋 {{ user.username }} | <a href="{% url 'comptes:logout' %}">Déconnexion</a></p>
{% else %}
    <p><a href="{% url 'comptes:login' %}"> Se connecter pour gère</a></p>
{% endif %}

<form id="formL" {% if not user.is_authenticated %}style="display:none;"{% endif %}>
    <input id="titre" placeholder="Titre *" required>
    <input id="isbn" placeholder="ISBN" required>
    <input id="date_pub" type="date" required>
    <input id="auteur_id" type="number" placeholder="ID Auteur *" required>
    <input id="pages" type="number" placeholder="Pages">
    <textarea id="resume" placeholder="Résumé"></textarea>
    <button>Ajouter</button>
</form>

<ul id="listL">Chargement...</ul>

<script>
API='/api/livres/';
let isAuthenticated = {% if user.is_authenticated %}true{% else %}false{% endif %};

async function load(){let r=await fetch(API),d=await r.json();document.getElementById('listL').innerHTML=d.map(l=>`<li><strong>${l.titre}</strong><br>📖 ${l.isbn} | ✍️ ${l.auteur}<br>📅 ${l.date_publication} | 📄 ${l.nombre_pages}p<br>${l.resume?'📝 '+l.resume:''}${isAuthenticated ? `<button onclick="del(${l.id})">🗑️</button>` : ''}</li>`).join('')}
document.getElementById('formL').onsubmit=async e=>{e.preventDefault();let f={titre:document.getElementById('titre').value,isbn:document.getElementById('isbn').value,date_publication:document.getElementById('date_pub').value,auteur_id:parseInt(document.getElementById('auteur_id').value),nombre_pages:document.getElementById('pages').value||null,resume:document.getElementById('resume').value};await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(f)});document.getElementById('formL').reset();load()};
async function del(id){if(confirm('Supprimer ?')){await fetch(API+id+'/',{method:'DELETE'});load()}}
load();
</script>
{% endblock %}
