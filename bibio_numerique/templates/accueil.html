{% extends 'base.html' %}
{% block content %}
<h1>🏛️ Bibliothèque Numérique</h1>


{% if user.is_authenticated %}
    <p>👋 Bienvenue {{ user.username }} !</p>
    <a href="{% url 'comptes:logout' %}">🚪 Déconnexion</a>
{% else %}
    <a href="{% url 'comptes:login' %}">🔐 Se connecter</a>
{% endif %}


{% endblock %}
